name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build All Platforms
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Download dependencies
      run: |
        go mod tidy
        go mod download

    - name: Build all targets
      run: |
        BUILD="dist"
        APP="nekoipinfo"
        BENCH="nekoipinfo-bench"
        DBGEN="nekoipinfo-dbgen"
        FLAGS="-trimpath -ldflags=-s -w"

        build_one() {
          local GOOS=$1 GOARCH=$2 ARCH_NAME=$3 SUFFIX=$4 OS_DIR=$5
          echo "  ${GOOS}/${GOARCH} -> ${OS_DIR}/${APP}_${ARCH_NAME}${SUFFIX}"
          DIR="${BUILD}/${OS_DIR}"
          mkdir -p "$DIR"
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="-s -w" -o "${DIR}/${APP}_${ARCH_NAME}${SUFFIX}" ./cmd
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="-s -w" -o "${DIR}/${BENCH}_${ARCH_NAME}${SUFFIX}" ./cmd/bench
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="-s -w" -o "${DIR}/${DBGEN}_${ARCH_NAME}${SUFFIX}" ./cmd/dbgen
        }

        echo "=========================================="
        echo " Linux"
        echo "=========================================="
        build_one linux   amd64    x86_64    "" "Linux"
        build_one linux   386      x86       "" "Linux"
        build_one linux   arm64    arm64     "" "Linux"
        build_one linux   arm      arm       "" "Linux"
        build_one linux   mips     mips      "" "Linux"
        build_one linux   mipsle   mipsle    "" "Linux"
        build_one linux   mips64   mips64    "" "Linux"
        build_one linux   mips64le mips64le  "" "Linux"
        build_one linux   loong64  loong64   "" "Linux"
        build_one linux   riscv64  riscv64   "" "Linux"
        build_one linux   ppc64    ppc64     "" "Linux"
        build_one linux   ppc64le  ppc64le   "" "Linux"
        build_one linux   s390x    s390x     "" "Linux"

        echo "=========================================="
        echo " macOS"
        echo "=========================================="
        build_one darwin  amd64    x86_64    "" "macOS"
        build_one darwin  arm64    arm64     "" "macOS"

        echo "=========================================="
        echo " Windows"
        echo "=========================================="
        build_one windows amd64    x86_64    ".exe" "Windows"
        build_one windows 386      x86       ".exe" "Windows"
        build_one windows arm64    arm64     ".exe" "Windows"

    - name: Package releases
      run: |
        cd dist

        cp -r ../static .
        cp ../README.md .
        cp ../LICENSE .

        echo "Packaging Linux..."
        zip -r NekoIPinfo-Linux.zip Linux/ static/ README.md LICENSE

        echo "Packaging macOS..."
        zip -r NekoIPinfo-macOS.zip macOS/ static/ README.md LICENSE

        echo "Packaging Windows..."
        zip -r NekoIPinfo-Windows.zip Windows/ static/ README.md LICENSE

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/NekoIPinfo-Linux.zip
          dist/NekoIPinfo-macOS.zip
          dist/NekoIPinfo-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}